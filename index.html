        <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwoECO9nOgLN2JzrsdI3TKDGDx4lclX2LyOQOZ2PHJdNmlt8i4xkCi1pDFAgbtqnFJE/exec';
        
        const form = document.getElementById('waitlist-form');
        const message = document.getElementById('waitlist-message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            message.textContent = 'Submitting...';
            
            try {
                const formData = new FormData(form);
                formData.append('source', 'landing-page');
                
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    message.textContent = 'Thank you! You are on the list.';
                    form.reset();
                } else {
                    message.textContent = 'There was an issue. Please try again.';
                }
            } catch (err) {
                message.textContent = 'Network error. Please try again.';
            }
        });
    </script>
